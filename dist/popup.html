<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Garage61 Setup Collector</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; min-width: 320px; }
    h1 { font-size: 16px; margin: 0 0 10px; }
    .row { margin-bottom: 8px; }
    label { display: block; font-size: 12px; margin-bottom: 4px; }
    input[type="number"], textarea { width: 100%; box-sizing: border-box; }
    textarea { min-height: 92px; resize: vertical; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions button { flex: 1; padding: 8px; }
    #status { margin-top: 8px; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Garage61 Setup Collector</h1>

  <div class="row">
    <label><input id="dryRun" type="checkbox" /> Dry run</label>
  </div>
  <div class="row">
    <label for="delayMs">Delay (ms)</label>
    <input id="delayMs" type="number" min="0" />
  </div>
  <div class="row">
    <label for="retryCount">Retry count</label>
    <input id="retryCount" type="number" min="0" />
  </div>
  <div class="row">
    <label for="maxRows">Max rows (1-100)</label>
    <input id="maxRows" type="number" min="1" max="100" />
  </div>
  <div class="row">
    <label><input id="persistDedupe" type="checkbox" /> Persist dedupe across sessions</label>
  </div>
  <div class="row">
    <label><input id="debugMode" type="checkbox" /> Debug mode (verbose logs)</label>
  </div>
  <div class="row">
    <label for="blockedNames">Blocked names (one per line)</label>
    <textarea id="blockedNames"></textarea>
  </div>

  <div class="actions">
    <button id="save" type="button">Save Settings</button>
    <button id="start" type="button">Start Import</button>
  </div>
  <div id="status">Ready.</div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
