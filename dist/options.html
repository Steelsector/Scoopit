<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Garage61 Setup Collector Options</title>
</head>
<body>
  <h1>Garage61 Setup Collector</h1>
  <label><input id="dryRun" type="checkbox" /> Dry run</label><br />
  <label>Delay (ms) <input id="delayMs" type="number" min="0" /></label><br />
  <label>Retry count <input id="retryCount" type="number" min="0" /></label><br />
  <label>Max rows (1-100) <input id="maxRows" type="number" min="1" max="100" /></label><br />
  <label><input id="persistDedupe" type="checkbox" /> Persist dedupe across sessions</label><br />
  <label>Blocked names (one per line)</label><br />
  <textarea id="blockedNames" rows="8" cols="40"></textarea><br />
  <button id="save">Save</button>
  <p id="status"></p>
  <script type="module" src="./options.js"></script>
</body>
</html>
